<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OCR Video Player</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>

    <script>
        if (sessionStorage.getItem('theme') === 'dark') {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>
    <style>
        /* Light Mode Placeholder */
        .video-placeholder {
            background: repeating-linear-gradient(
                45deg,
                #e5e7eb,
                #e5e7eb 10px,
                #d1d5db 10px,
                #d1d5db 20px
            );
        }

        /* Dark Mode Placeholder */
        .dark .video-placeholder {
            background: repeating-linear-gradient(
                45deg,
                #1f2937,
                #1f2937 10px,
                #111827 10px,
                #111827 20px
            );
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 dark:bg-gray-900 dark:text-white min-h-screen flex flex-col items-center justify-center p-4 font-sans transition-colors duration-300">

    <!-- Main Container -->
    <div class="w-full max-w-3xl bg-white dark:bg-gray-800 rounded-xl shadow-2xl overflow-hidden border border-gray-200 dark:border-gray-700 p-6 transition-colors duration-300">

        <!-- Header -->
       <h1 class="text-2xl font-bold text-center mb-6 text-gray-800 dark:text-gray-100 tracking-wide">OCR VIDEO PLAYER</h1>

        <!-- Video Area Placeholder -->
        <div class="relative w-full aspect-video bg-gray-200 dark:bg-black rounded-lg border-2 border-gray-300 dark:border-gray-600 overflow-hidden flex items-center justify-center mb-6 group">
            <div class="video-placeholder absolute inset-0 opacity-50 dark:opacity-50"></div>

            <!-- Placeholder Content -->
            <div class="relative z-10 text-center">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-16 w-16 mx-auto text-gray-400 dark:text-gray-500 mb-2 group-hover:text-blue-500 transition-colors duration-300" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z" />
                </svg>
            </div>
        </div>

        <!-- Controls Area -->
        <div class="flex gap-4 justify-center mb-8 flex-wrap">

            <button id="btn-play" onclick="window.location.href='/videos'" class="flex-1 sm:flex-none px-8 py-3 bg-green-600 hover:bg-green-700 active:bg-green-800 text-white font-semibold rounded-lg transition duration-200 flex items-center justify-center gap-2 shadow-lg">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z" clip-rule="evenodd"/>
                </svg>
                BROWSE VIDEOS
            </button>

            <button id="btn-texts" class="flex-1 sm:flex-none px-8 py-3 bg-blue-600 hover:bg-blue-700 active:bg-blue-800 text-white font-semibold rounded-lg transition duration-200 flex items-center justify-center gap-2 shadow-lg">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z" />
                </svg>
                GENERATE TEXTS
            </button>

            <button id="theme-toggle" class="flex-1 sm:flex-none px-8 py-3 bg-gray-200 hover:bg-gray-300 active:bg-gray-400 dark:bg-gray-700 dark:hover:bg-gray-600 dark:active:bg-gray-500 text-gray-900 dark:text-white font-semibold rounded-lg transition duration-200 flex items-center justify-center gap-2 shadow-lg">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
                </svg>
                CHANGE THEME
            </button>
        </div>

        <!-- OCR Text Area -->
        <div class="bg-gray-100 dark:bg-gray-900 rounded-lg p-4 border border-gray-300 dark:border-gray-700 min-h-[150px]">
            <h3 class="text-xs font-bold text-gray-600 dark:text-gray-500 uppercase tracking-wider mb-2">Output Log</h3>
            <div id="text-output" class="font-mono text-sm text-gray-800 dark:text-gray-300 space-y-2 h-32 overflow-y-auto custom-scrollbar">
                <p class="text-gray-500 dark:text-gray-600 italic">click Browse to see available videos</p>
            </div>
        </div>
    </div>
<script src="/js/app.js"></script>
</body>
</html>
